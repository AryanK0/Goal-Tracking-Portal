services:
  - type: web
    name: momentum-ai-api
    runtime: python
    buildCommand: python -m pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
